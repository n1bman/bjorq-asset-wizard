<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bjorq 3D Worker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e4e4e7; padding: 2rem; min-height: 100vh; }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
    .subtitle { color: #71717a; font-size: 0.875rem; margin-bottom: 2rem; }
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #71717a; margin-bottom: 0.75rem; }
    .status-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; font-size: 0.875rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: #22c55e; box-shadow: 0 0 6px #22c55e80; }
    .dot-red { background: #ef4444; box-shadow: 0 0 6px #ef444480; }
    .dot-yellow { background: #eab308; box-shadow: 0 0 6px #eab30880; }
    .label { color: #a1a1aa; }
    .value { color: #e4e4e7; font-weight: 500; }
    .url-box { display: flex; align-items: center; gap: 0.5rem; background: #09090b; border: 1px solid #27272a; border-radius: 0.5rem; padding: 0.5rem 0.75rem; margin-top: 0.75rem; }
    .url-box code { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #a78bfa; }
    .btn { background: #27272a; border: 1px solid #3f3f46; color: #e4e4e7; padding: 0.375rem 0.75rem; border-radius: 0.375rem; cursor: pointer; font-size: 0.75rem; transition: background 0.15s; }
    .btn:hover { background: #3f3f46; }
    .log-box { background: #09090b; border: 1px solid #27272a; border-radius: 0.5rem; padding: 0.75rem; max-height: 200px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #71717a; line-height: 1.6; }
    .log-box .log-line { white-space: pre-wrap; word-break: break-all; }
    .warn { color: #eab308; }
    .error { color: #ef4444; }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
    .badge-ok { background: #22c55e20; color: #22c55e; }
    .badge-err { background: #ef444420; color: #ef4444; }
    .badge-warn { background: #eab30820; color: #eab308; }
    #last-job { font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧊 Bjorq 3D Worker</h1>
    <p class="subtitle">TRELLIS.2 inference engine for Bjorq Asset Wizard</p>

    <div class="card">
      <div class="card-title">Status</div>
      <div class="status-row">
        <span class="dot" id="status-dot"></span>
        <span class="value" id="status-text">Connecting…</span>
        <span class="badge" id="version-badge"></span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">GPU</div>
      <div class="status-row">
        <span class="label">Device:</span>
        <span class="value" id="gpu-name">—</span>
      </div>
      <div class="status-row">
        <span class="label">VRAM:</span>
        <span class="value" id="gpu-vram">—</span>
      </div>
      <div class="status-row">
        <span class="label">Driver:</span>
        <span class="value" id="gpu-driver">—</span>
      </div>
      <div class="status-row">
        <span class="label">CUDA Runtime:</span>
        <span class="value" id="gpu-cuda">—</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Connection URL</div>
      <p style="font-size:0.8rem;color:#a1a1aa;margin-bottom:0.5rem;">
        Enter this URL in Bjorq Asset Wizard add-on configuration.
      </p>
      <div class="url-box">
        <code id="worker-url">—</code>
        <button class="btn" onclick="copyUrl()">Copy</button>
      </div>
    </div>

    <div class="card" id="last-job-card" style="display:none;">
      <div class="card-title">Last Job</div>
      <div id="last-job"></div>
    </div>

    <div class="card">
      <div class="card-title">Log</div>
      <div class="log-box" id="log-box">
        <div class="log-line">Waiting for logs…</div>
      </div>
    </div>
  </div>

  <script>
    const port = location.port || '8080';

    function getWorkerUrl() {
      return `http://${location.hostname}:${port}`;
    }

    async function refresh() {
      try {
        const res = await fetch('/status');
        const data = await res.json();

        document.getElementById('status-dot').className = data.ok ? 'dot dot-green' : 'dot dot-red';
        document.getElementById('status-text').textContent = data.ok ? 'Running' : 'Error';
        document.getElementById('version-badge').textContent = `v${data.version}`;
        document.getElementById('version-badge').className = 'badge badge-ok';

        document.getElementById('gpu-name').textContent = data.gpuName || 'Not detected';
        document.getElementById('gpu-vram').textContent = data.vramGB ? `${data.vramGB} GB` : '—';
        document.getElementById('gpu-driver').textContent = data.driver || '—';
        document.getElementById('gpu-cuda').textContent = data.cudaRuntime || '—';

        if (!data.gpu) {
          document.getElementById('gpu-name').innerHTML = '<span class="warn">⚠ No NVIDIA GPU detected</span>';
        }

        document.getElementById('worker-url').textContent = getWorkerUrl();

        if (data.lastJob) {
          document.getElementById('last-job-card').style.display = '';
          const badge = data.lastJob.status === 'done' ? 'badge-ok' : data.lastJob.status === 'failed' ? 'badge-err' : 'badge-warn';
          document.getElementById('last-job').innerHTML =
            `<span class="badge ${badge}">${data.lastJob.status}</span> &nbsp; ${data.lastJob.id} — ${data.lastJob.step}`;
        }

        if (data.lastError) {
          document.getElementById('status-text').textContent = `Error: ${data.lastError}`;
          document.getElementById('status-dot').className = 'dot dot-red';
        }
      } catch (e) {
        document.getElementById('status-dot').className = 'dot dot-red';
        document.getElementById('status-text').textContent = 'Not reachable';
      }

      // Fetch logs
      try {
        const logRes = await fetch('/logs');
        const logData = await logRes.json();
        const box = document.getElementById('log-box');
        box.innerHTML = logData.lines.map(l => `<div class="log-line">${escHtml(l)}</div>`).join('');
        box.scrollTop = box.scrollHeight;
      } catch {}
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function copyUrl() {
      navigator.clipboard.writeText(getWorkerUrl()).then(() => {
        const btn = document.querySelector('.url-box .btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      });
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>

name: HA Add-on Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-ha-addon:
    name: Build & Push HA Add-on (amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare add-on directory
        run: |
          chmod +x ./bjorq_asset_wizard/prepare-addon.sh
          ./bjorq_asset_wizard/prepare-addon.sh

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push HA image
        uses: docker/build-push-action@v6
        with:
          context: bjorq_asset_wizard
          file: bjorq_asset_wizard/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/n1bman/bjorq-asset-wizard-amd64:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/n1bman/bjorq-asset-wizard-amd64:latest
          # No cache — prevents cross-workflow layer contamination

<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bjorq Thumbnail Renderer</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      #status {
        position: fixed;
        inset: auto 0 0 0;
        font: 12px/1.3 system-ui, sans-serif;
        color: #fff;
        background: rgba(0, 0, 0, 0.75);
        padding: 4px 6px;
        z-index: 10;
        display: none;
      }
      canvas {
        display: block;
        width: 192px;
        height: 192px;
      }
    </style>
  </head>
  <body>
    <div id="status"></div>
    <script src="/.tmp-thumbgen/thumbnail-renderer.bundle.js"></script>
  </body>
</html>

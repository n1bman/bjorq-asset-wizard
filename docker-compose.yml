# ============================================
# Bjorq Asset Wizard — Local Development
# ============================================
# Usage: docker compose up -d
#
# The backend runs on port 3500.
# The frontend runs separately via `npm run dev` (port 8080).

services:
  wizard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bjorq-asset-wizard
    ports:
      - "3500:3500"
    volumes:
      # Persistent storage — survives container restarts
      - wizard-storage:/data/storage
      # Catalog output — shared with frontend if needed
      - wizard-catalog:/data/catalog
    environment:
      - NODE_ENV=development
      - PORT=3500
      - HOST=0.0.0.0
      - LOG_LEVEL=debug
      - LOG_FILE=/data/storage/logs/wizard.log
      - STORAGE_PATH=/data/storage
      - CATALOG_PATH=/data/catalog
      - MAX_FILE_SIZE_MB=100
      - THUMBNAIL_SIZE=512
      - THUMBNAIL_FORMAT=webp
      - THUMBNAIL_QUALITY=80
      - DEFAULT_MAX_TEXTURE_SIZE=2048
      - DEFAULT_TEXTURE_QUALITY=85
      - CORS_ORIGINS=*
      - JOB_RETENTION_HOURS=24
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3500/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  wizard-storage:
    driver: local
  wizard-catalog:
    driver: local
